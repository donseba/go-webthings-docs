#file: noinspection YAMLSchemaValidation
version: 2.1

executors:
  go:
    docker:
      - image: cimg/go:1.26
    working_directory: ~/repo

jobs:
  test:
    executor: go
    steps:
      - checkout
      - run:
          name: Run tests
          command: go test ./...

  golangci:
    executor: go
    steps:
      - checkout
      - run:
          name: Run golangci-lint
          command: golangci-lint run ./...

  build_and_push_website:
    executor: go
    steps:
      - checkout
      - run:
          name: Build website executable
          command: |
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ~/repo/deploy/website/website ~/repo/cmd/website/main.go
            test -f ~/repo/deploy/website/website
            test -d ~/repo/deploy/website/docs
            test -d ~/repo/deploy/website/main
            test -d ~/repo/deploy/website/showcase

      - setup_remote_docker:
          version: default
          docker_layer_caching: true

      - run:
          name: Build and push website image
          command: |
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              TAG="latest"
            else
              TAG="${CIRCLE_TAG:-$CIRCLE_SHA1}"
            fi

            cd ~/repo/deploy/website
            docker build -t registry.digitalocean.com/savage-software/go-webthings-website:$TAG .
            docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD" registry.digitalocean.com/savage-software
            docker push registry.digitalocean.com/savage-software/go-webthings-website:$TAG

workflows:
  version: 2
  build_and_test:
    jobs:
      - test
      - golangci
      - build_and_push_website:
          requires:
            - test
            - golangci
          filters:
            branches:
              only:
                - main
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/
