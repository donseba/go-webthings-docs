version: '3'

dotenv: [".env"]

tasks:
  default:
    desc: Display all available tasks as the default action
    cmds:
      - task -l

  install-tailwind:
    desc: Install tailwindcss for the current OS
    cmds:
      - task: install-tailwind-{{OS}}

  build-css:
    desc: Build the shared docs stylesheet from Tailwind source
    cmds:
      - task: build-css-{{OS}}

  build-css-windows:
    desc: Build the shared docs stylesheet on Windows
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (!(Test-Path '.\\bin\\tailwindcss.exe')) { task install-tailwind-windows }; .\\bin\\tailwindcss.exe -i '.\\deploy\\static\\site.tailwind.css' -o '.\\deploy\\static\\site.css' --minify"

  build-css-darwin:
    desc: Build the shared docs stylesheet on macOS
    platforms: [darwin]
    cmds:
      - test -x ./bin/tailwindcss || task install-tailwind-darwin
      - ./bin/tailwindcss -i ./deploy/static/site.tailwind.css -o ./deploy/static/site.css --minify

  build-css-linux:
    desc: Build the shared docs stylesheet on Linux
    platforms: [linux]
    cmds:
      - test -x ./bin/tailwindcss || task install-tailwind-linux
      - ./bin/tailwindcss -i ./deploy/static/site.tailwind.css -o ./deploy/static/site.css --minify

  install-tailwind-windows:
    desc: Install tailwindcss on Windows
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if (!(Test-Path '.\\bin')) { New-Item -ItemType Directory -Path '.\\bin' | Out-Null }; Invoke-WebRequest -Uri 'https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe' -OutFile '.\\bin\\tailwindcss.exe'"

  install-tailwind-darwin:
    desc: Install tailwindcss on macOS
    platforms: [darwin]
    cmds:
      - mkdir -p ./bin
      - ARCH=$(uname -m); if [ "$ARCH" = "arm64" ]; then URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64"; else URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-x64"; fi; curl -sL "$URL" -o ./bin/tailwindcss
      - chmod +x ./bin/tailwindcss

  install-tailwind-linux:
    desc: Install tailwindcss on Linux
    platforms: [linux]
    cmds:
      - mkdir -p ./bin
      - ARCH=$(uname -m); if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-arm64"; else URL="https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64"; fi; curl -sL "$URL" -o ./bin/tailwindcss
      - chmod +x ./bin/tailwindcss

  install-golangci-lint:
    desc: Install golangci-lint
    cmds:
      - task: install-golangci-lint-{{OS}}

  install-golangci-lint-darwin:
    desc: Install golangci-lint on macOS
    platforms: [darwin]
    cmds:
      - mkdir -p "$(go env GOPATH)/bin"
      - TMPDIR=$(mktemp -d) && ARCH=$(uname -m); if [ "$ARCH" = "arm64" ]; then ARCH="arm64"; else ARCH="amd64"; fi; curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v2.12.2/golangci-lint-2.12.2-darwin-${ARCH}.tar.gz" -o "$TMPDIR/golangci-lint.tar.gz" && tar -xzf "$TMPDIR/golangci-lint.tar.gz" -C "$TMPDIR" && cp "$TMPDIR/golangci-lint-2.12.2-darwin-${ARCH}/golangci-lint" "$(go env GOPATH)/bin/golangci-lint" && chmod +x "$(go env GOPATH)/bin/golangci-lint" && rm -rf "$TMPDIR"
      - $(go env GOPATH)/bin/golangci-lint --version

  install-golangci-lint-linux:
    desc: Install golangci-lint on Linux
    platforms: [linux]
    cmds:
      - mkdir -p "$(go env GOPATH)/bin"
      - TMPDIR=$(mktemp -d) && ARCH=$(uname -m); if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then ARCH="arm64"; else ARCH="amd64"; fi; curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v2.12.2/golangci-lint-2.12.2-linux-${ARCH}.tar.gz" -o "$TMPDIR/golangci-lint.tar.gz" && tar -xzf "$TMPDIR/golangci-lint.tar.gz" -C "$TMPDIR" && cp "$TMPDIR/golangci-lint-2.12.2-linux-${ARCH}/golangci-lint" "$(go env GOPATH)/bin/golangci-lint" && chmod +x "$(go env GOPATH)/bin/golangci-lint" && rm -rf "$TMPDIR"
      - $(go env GOPATH)/bin/golangci-lint --version

  install-golangci-lint-windows:
    desc: Install golangci-lint on Windows
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference = 'Stop'; $gopath = go env GOPATH; $bin = Join-Path $gopath 'bin'; if (!(Test-Path $bin)) { New-Item -ItemType Directory -Path $bin | Out-Null }; $arch = if ([Environment]::Is64BitOperatingSystem) { 'amd64' } else { '386' }; $tmp = New-Item -ItemType Directory -Path ([System.IO.Path]::GetTempPath() + [System.Guid]::NewGuid().ToString()); try { $zip = Join-Path $tmp 'golangci-lint.zip'; Invoke-WebRequest -Uri ('https://github.com/golangci/golangci-lint/releases/download/v2.12.2/golangci-lint-2.12.2-windows-' + $arch + '.zip') -OutFile $zip; Expand-Archive -Path $zip -DestinationPath $tmp -Force; Copy-Item -Force (Join-Path $tmp ('golangci-lint-2.12.2-windows-' + $arch + '\golangci-lint.exe')) (Join-Path $bin 'golangci-lint.exe'); & (Join-Path $bin 'golangci-lint.exe') --version } finally { Remove-Item -Recurse -Force $tmp }"

  install-goimports-reviser:
    desc: Install goimports-reviser
    cmds:
      - go install -v github.com/incu6us/goimports-reviser/v3@latest

  install-gofumpt:
    desc: Install gofumpt
    cmds:
      - go install mvdan.cc/gofumpt@latest

  deps:
    desc: handle dependencies
    cmds:
      - go mod tidy

  test:
    desc: Run go tests
    cmd: go test ./... -cover -race

  lint:
    desc: Run golangci-lint
    cmds:
      - go version
      - golangci-lint run


  watch-docs-css-darwin-linux:
    platforms: [darwin, linux]
    cmds:
      - ./bin/tailwindcss --cwd ./deploy/docs -i ./tailwind/main.css -o ./assets/css/styles.css -w -m

  watch-docs-css-windows:
    platforms: [windows]
    cmds:
      - powershell -NoProfile -Command ".\\bin\\tailwindcss.exe --cwd .\\deploy\\docs -i .\\tailwind\\main.css -o .\\assets\\css\\styles.css -w -m"

  watch-docs-css:
    desc: Watch for changes in the css files
    deps:
      - watch-docs-css-darwin-linux
      - watch-docs-css-windows

  serve-docs-darwin-linux:
    desc: Run the server on macOS/Linux
    platforms: [darwin, linux]
    cmds:
      - go build -o ./deploy/docs/main ./cmd/docs/main.go
      - cd ./deploy/docs && ./main

  serve-docs-windows:
    desc: Run the server on Windows
    platforms: [windows]
    cmds:
      - powershell -NoProfile -Command "go build -o .\\deploy\\docs\\main.exe .\\cmd\\docs\\main.go"
      - powershell -NoProfile -Command "Set-Location .\\deploy\docs; .\\main.exe"

  serve-docs:
    desc: Run the server
    cmds:
      - cmd: task serve-docs-windows
        platforms: [windows]
      - cmd: task serve-docs-darwin-linux
        platforms: [darwin, linux]
